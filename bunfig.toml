[test]
# Enforce full coverage of every package's source. CI fails below 100%.
coverage = true
coverageThreshold = { line = 1.0, function = 1.0 }
coverageSkipTestFiles = true
coverageReporter = ["text"]
# Native projects generated by `expo run:*` contain vendored test fixtures
# (Hermes, CocoaPods, Gradle) that are not part of this repository's suite.
pathIgnorePatterns = [
  "examples/react-native-expo/ios/**",
  "examples/react-native-expo/android/**",
  "examples/react-native-expo/dist/**"
]
# Built artifacts and demos are not unit-test targets; measure src only.
coveragePathIgnorePatterns = ["/dist/", "/node_modules/", "/examples/"]
